version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: noderegistry
      POSTGRES_PASSWORD: noderegistry
      POSTGRES_DB: noderegistry
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noderegistry"]
      interval: 5s
      timeout: 5s
      retries: 10

  grpc-server:
    build:
      context: .
      dockerfile: grpc_server/Dockerfile
    environment:
      DATABASE_URL: postgresql://noderegistry:noderegistry@db:5432/noderegistry
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "50051:50051"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      GRPC_HOST: grpc-server:50051
    ports:
      - "8080:8080"
    depends_on:
      - grpc-server

volumes:
  postgres_data:
