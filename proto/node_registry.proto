syntax = "proto3";

package noderegistry;

service NodeRegistry {
  rpc Register(RegisterRequest) returns (NodeResponse);
  rpc List(Empty) returns (NodeList);
  rpc Get(GetRequest) returns (NodeResponse);
  rpc Delete(DeleteRequest) returns (Empty);
}

message Empty {}

message RegisterRequest {
  string name = 1;
  string host = 2;
  int32 port = 3;
}

message GetRequest {
  string name = 1;
}

message DeleteRequest {
  string name = 1;
}

message NodeResponse {
  int32 id = 1;
  string name = 2;
  string host = 3;
  int32 port = 4;
  string status = 5;
  string created_at = 6;
  string updated_at = 7;
}

message NodeList {
  repeated NodeResponse nodes = 1;
}
